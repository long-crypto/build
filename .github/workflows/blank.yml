name: build on openSUSE Tumbleweed

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      target:
        description: "选择构建类型"
        required: true
        default: "htop"
        type: choice
        options:
          - htop
          - sway
          - foot
          - git

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: registry.opensuse.org/opensuse/tumbleweed

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        if: ${{ inputs.target == 'htop' }}
        run: |
          zypper -n refresh
          zypper -n install --no-recommends \
            gcc gcc-c++ make cmake ninja git pkg-config \
            libopenssl-devel zlib-devel ncurses-devel autoconf libtool

      - name: Configure&build
        if: ${{ inputs.target == 'htop' }}
        env:
          CPPFLAGS: -D_GNU_SOURCE
          CFLAGS: -O3 -g -flto -std=gnu11 -fno-finite-math-only
          LDFLAGS: -O3 -g -flto
        run: |
            git clone https://github.com/htop-dev/htop
            cd htop
            ./autogen.sh
            ./configure --enable-static  --enable-werror  --enable-unicode --disable-hwloc --disable-delayacct --enable-capabilities
            make -k

      - name: Upload artifacts
        if: ${{ inputs.target == 'htop' }}
        uses: actions/upload-artifact@v4
        with:
         name: htop
         path: ./htop/htop
